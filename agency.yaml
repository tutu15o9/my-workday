# Agency configuration for my-workday workspace
# Run `agency cp` from this folder to start a daily work assistant session

mcps:
  builtins:
    # Communication
    teams: true        # Teams messages, channels, chat
    mail: true         # Outlook email — read, reply, draft, search
    calendar: true     # Calendar events and scheduling

    # Work tracking
    # ADO supports multiple orgs via aliases — add one entry per org
    ado:                               # Primary ADO org
      type: ado
      organization: "[your-primary-ado-org]"  # e.g. "msazure"
      toolsets:
        - "all"

    ado_secondary:                     # Second ADO org (alias → ado MCP)
      type: ado
      organization: "[your-second-ado-org]"   # e.g. "microsoft"
      toolsets:
        - "all"

    planner: true      # Planner tasks and boards

    # Broad search & context
    m365-copilot: true # M365 content search across emails, chats, docs
    m365-user: true    # Org chart, manager, direct reports
    graph: true        # Microsoft Graph for enterprise data
    workiq: true       # WorkIQ workplace activity insights

    # Documents
    onedrive: true     # OneDrive files and documents
    sharepoint: true   # SharePoint sites and documents

    # Engineering context — one entry per org/project
    bluebird:                              # Primary Bluebird instance
      type: bluebird
      organization: "[your-primary-ado-org]"
      project: "[your-primary-project]"    # e.g. "One"
      full: true

    bluebird_secondary:                    # Second Bluebird instance (alias → bluebird MCP)
      type: bluebird
      organization: "[your-second-ado-org]"
      project: "[your-second-project]"
      full: true
