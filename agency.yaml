# Agency configuration for my-workday workspace
# Run `agency cp` from this folder to start a daily work assistant session

mcps:
  builtins:
    # Communication
    teams: true        # Teams messages, channels, chat
    mail: true         # Outlook email — read, reply, draft, search
    calendar: true     # Calendar events and scheduling

    # Work tracking
    ado:                           # Azure DevOps work items, PRs, repos
      organization: "[your-ado-org]"   # e.g. "msazure" or your ADO org name
      toolsets: "all"

    planner: true      # Planner tasks and boards

    # Broad search & context
    m365-copilot: true # M365 content search across emails, chats, docs
    m365-user: true    # Org chart, manager, direct reports
    graph: true        # Microsoft Graph for enterprise data
    workiq: true       # WorkIQ workplace activity insights

    # Documents
    onedrive: true     # OneDrive files and documents
    sharepoint: true   # SharePoint sites and documents

    # Engineering context
    bluebird:                      # Engineering Copilot (Bluebird)
      organization: "[your-ado-org]"   # Same ADO org as above
      project: "[your-ado-project]"    # e.g. "One"
      full: true                       # Enable full mode
